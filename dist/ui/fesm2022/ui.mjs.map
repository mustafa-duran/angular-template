<input
  [attr.id]="controlId()"
  [attr.type]="resolvedType()"
  [attr.name]="name() ?? null"
  [attr.placeholder]="resolvedPlaceholder() ?? null"
  [attr.autocomplete]="autocomplete() ?? null"
  [attr.autocapitalize]="autocapitalize() ?? null"
  [attr.autocorrect]="autocorrect() ?? null"
  [attr.inputmode]="inputmode() ?? null"
  [attr.min]="min() ?? null"
  [attr.max]="max() ?? null"
  [attr.step]="step() ?? null"
  [attr.minlength]="minlength() ?? null"
  [attr.maxlength]="maxlength() ?? null"
  [attr.pattern]="pattern() ?? null"
  [attr.accept]="isFile() ? accept() ?? null : null"
  [attr.multiple]="isFile() && multiple() ? '' : null"
  [attr.aria-label]="ariaLabel() ?? null"
  [attr.aria-describedby]="ariaDescribedby() ?? null"
  [attr.aria-invalid]="ariaInvalid() ?? null"
  [attr.autofocus]="autofocus() ? '' : null"
  [attr.required]="required() ? '' : null"
  [attr.readonly]="isReadonly() ? '' : null"
  [disabled]="isDisabled()"
  [class]="classes()"
  [value]="isFile() ? undefined : value()"
  (input)="handleInput($event)"
  (change)="handleInput($event)"
  (blur)="handleBlur()"
/>
